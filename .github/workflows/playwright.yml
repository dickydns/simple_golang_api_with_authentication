name: Go + Playwright Tests

on:
  push:
    branches: [ main, dev, staging ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: checkout repository
      uses: actions/checkout@v4

    - name: setup go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: setup node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: install go dependencies
      run: go mod download

    - name: create .env file
      run: |
        echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
        echo "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}" >> .env
        echo "JWT_ACCESS_EXPIRE_MINUTES=${{ secrets.JWT_ACCESS_EXPIRE_MINUTES }}" >> .env
        echo "JWT_REFRESH_EXPIRE_DAYS=${{ secrets.JWT_REFRESH_EXPIRE_DAYS }}" >> .env
        echo "DATABASE_USER=${{ secrets.DATABASE_USER }}" >> .env
        echo "DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}" >> .env
        echo "DATABASE_ADDRESS=${{ secrets.DATABASE_ADDRESS }}" >> .env
        echo "DATABASE_NAME=${{ secrets.DATABASE_NAME }}" >> .env

    - name: install playwright dependencies
      run: |
        cd tests/e2e
        npm ci
        npx playwright install --with-deps

    - name: start go server
      run: |
        go run main.go > server.log 2>&1 &
        sleep 10

    - name: check server
      run: |
        curl http://127.0.0.1:3100 || true
        cat server.log || true

    - name: run playwright tests
      run: |
        cd tests/e2e
        npx playwright test

    - name: upload playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: tests/e2e/playwright-report
