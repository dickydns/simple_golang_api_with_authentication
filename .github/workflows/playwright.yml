name: Go + Playwright Tests

on:
  push:
    branches: [ main, dev, staging ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: checkout repository
      uses: actions/checkout@v4

    - name: setup go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: setup node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: install go dependencies
      run: go mod download

    - name: create .env file
      run: |
        echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
        echo "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}" >> .env
        echo "JWT_ACCESS_EXPIRE_MINUTES=${{ secrets.JWT_ACCESS_EXPIRE_MINUTES }}" >> .env
        echo "JWT_REFRESH_EXPIRE_DAYS=${{ secrets.JWT_REFRESH_EXPIRE_DAYS }}" >> .env
        echo "DATABASE_USER=${{ secrets.DATABASE_USER }}" >> .env
        echo "DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}" >> .env
        echo "DATABASE_ADDRESS=${{ secrets.DATABASE_ADDRESS }}" >> .env
        echo "DATABASE_NAME=${{ secrets.DATABASE_NAME }}" >> .env
    - name: install playwright dependencies
      run: |
        cd tests/e2e
        npm ci
        npx playwright install --with-deps

    - name: build go binary
      run: go build -o ./app-server main.go

    - name: start go server
      run: |
        ./app-server > server.log 2>&1 &
        echo $! > server.pid
        echo "Server PID: $(cat server.pid)"
    - name: debug on failure
      if: failure()
      run: |
        echo "=== server.log ==="
        cat server.log || echo "(no log)"
        echo ""
        echo "=== .env file (tanpa value sensitif) ==="
        cat .env | sed 's/=.*/=***/' || echo "(no .env)"
        echo ""
        echo "=== MySQL connection test ==="
        mysqladmin ping -h 127.0.0.1 -u ${{ secrets.DATABASE_USER }} -p${{ secrets.DATABASE_PASSWORD }} || echo "MySQL tidak bisa diakses"
        echo ""
        echo "=== Port yang aktif ==="
        ss -tlnp
    # ✅ Ganti sleep 10 dengan wait aktif — lebih reliable
    - name: wait for server to be ready
      run: |
        echo "Waiting for server on port 3100..."
        for i in $(seq 1 60); do
          if curl -s http://127.0.0.1:3100 > /dev/null 2>&1; then
            echo "✅ Server is up after ${i}s"
            exit 0
          fi
          echo "Attempt $i/60 — server not ready yet..."
          sleep 2
        done
        echo "❌ Server failed to start"
        cat server.log
        exit 1
    - name: check server status
      if: always()
      run: |
        echo "=== server.log ==="
        cat server.log || echo "(no log file)"
        echo ""
        echo "=== Port check ==="
        ss -tlnp | grep 3100 || echo "Port 3100 not listening"
        echo ""
        echo "=== Process check ==="
        ps aux | grep app-server || true

    - name: run playwright tests
      run: |
        cd tests/e2e
        npx playwright test

    - name: upload playwright report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: tests/e2e/playwright-report

    - name: upload server log
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: server-log
        path: server.log
